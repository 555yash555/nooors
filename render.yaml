services:
  - type: web
    name: nooors-backend
    runtime: node
    plan: free
    region: oregon
    # Monorepo: install at root (hoists deps), then cd into the backend
    # workspace so `medusa build` registers ts-node from the correct cwd.
    # NPM_CONFIG_PRODUCTION=false ensures devDeps (ts-node) install during build.
    # Migrations run after build so every deploy idempotently brings the DB to the
    # current schema. Safe because medusa db:migrate is no-op if already migrated.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install --include=dev --legacy-peer-deps && cd apps/backend && npx medusa build && npx medusa db:migrate
    startCommand: cd apps/backend && npx medusa start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: https://nooors-storefront.vercel.app
      - key: ADMIN_CORS
        value: https://nooors-backend.onrender.com
      - key: AUTH_CORS
        value: https://nooors-storefront.vercel.app,https://nooors-backend.onrender.com
      - key: MEDUSA_BACKEND_URL
        value: https://nooors-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
