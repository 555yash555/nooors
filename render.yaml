services:
  - type: web
    name: nooors-backend
    runtime: node
    plan: free
    region: oregon
    # Monorepo: install at root (hoists deps), then cd into the backend
    # workspace so `medusa build` registers ts-node from the correct cwd.
    # Build steps:
    #   1. Install ALL deps at monorepo root (NPM_CONFIG_PRODUCTION=false so ts-node from devDeps is included)
    #   2. medusa build → outputs server + admin to apps/backend/.medusa/server + .medusa/admin
    #   3. cd into .medusa/server (Medusa's production "self-contained" output)
    #   4. Install production-only deps for the packaged server
    #   5. Run migrations from inside the packaged server
    buildCommand: |
      NPM_CONFIG_PRODUCTION=false npm install --include=dev --legacy-peer-deps && \
      cd apps/backend && npx medusa build && \
      cp -r static .medusa/server/static && \
      cd .medusa/server && npm install --omit=dev --no-package-lock --legacy-peer-deps && \
      npx medusa db:migrate
    # Start the production server from inside its self-contained build dir.
    startCommand: cd apps/backend/.medusa/server && npm run start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: https://nooors-storefront.vercel.app
      - key: ADMIN_CORS
        value: https://nooors-backend.onrender.com
      - key: AUTH_CORS
        value: https://nooors-storefront.vercel.app,https://nooors-backend.onrender.com
      - key: MEDUSA_BACKEND_URL
        value: https://nooors-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
