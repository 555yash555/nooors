services:
  - type: web
    name: nooors-backend
    runtime: node
    plan: free
    region: oregon
    # NOTE: do NOT set rootDir. We need npm install to run at the monorepo root
    # so workspace deps get hoisted, then build from inside apps/backend.
    buildCommand: npm install --legacy-peer-deps && npm run build --workspace=apps/backend
    startCommand: cd apps/backend && npm run start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: https://nooors-storefront.vercel.app
      - key: ADMIN_CORS
        value: https://nooors-backend.onrender.com
      - key: AUTH_CORS
        value: https://nooors-storefront.vercel.app,https://nooors-backend.onrender.com
      - key: MEDUSA_BACKEND_URL
        value: https://nooors-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
