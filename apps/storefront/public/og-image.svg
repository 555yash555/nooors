<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="60%" stop-color="#2a2722"/>
      <stop offset="100%" stop-color="#0f0e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d4b787" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4b787" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.7  0 0 0 0 0.6  0 0 0 0 0.4  0 0 0 0.07 0"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.9"/>

  <g stroke="rgba(212,183,135,0.45)" stroke-width="0.6" fill="none">
    <line x1="80" y1="80" x2="1120" y2="80"/>
    <line x1="80" y1="550" x2="1120" y2="550"/>
  </g>

  <g transform="translate(80,80)">
    <text x="0" y="0" fill="#d4b787"
          font-family="Helvetica, Arial, sans-serif"
          font-size="14" letter-spacing="6">
      S/S 2025 · ATELIER
    </text>
  </g>

  <!-- Giant white "E" backdrop -->
  <text x="600" y="380" text-anchor="middle" fill="#fbf8f3" opacity="0.07"
        font-family="Georgia, serif" font-weight="400" font-size="600">E</text>

  <!-- Script wordmark -->
  <g transform="translate(600,330)" text-anchor="middle">
    <text x="0" y="0" fill="#fbf8f3"
          font-family="Allura, 'Brush Script MT', cursive"
          font-style="italic" font-weight="400"
          font-size="220">
      elora
    </text>
  </g>

  <!-- Flourish line through "elora" -->
  <path d="M 280 350 C 380 380, 600 320, 920 350"
        fill="none" stroke="#d4b787" stroke-width="1.2" opacity="0.7"/>

  <g transform="translate(600,440)">
    <line x1="-110" y1="0" x2="-25" y2="0" stroke="#b89968" stroke-width="0.8"/>
    <g transform="translate(0,0) rotate(45)">
      <rect x="-6" y="-6" width="12" height="12"
            fill="none" stroke="#b89968" stroke-width="0.8"/>
      <rect x="-3" y="-3" width="6" height="6" fill="#b89968"/>
    </g>
    <line x1="25" y1="0" x2="110" y2="0" stroke="#b89968" stroke-width="0.8"/>
  </g>

  <g transform="translate(600,500)" text-anchor="middle">
    <text x="0" y="0" fill="#e8d4a8"
          font-family="Helvetica, Arial, sans-serif"
          font-size="14" letter-spacing="9">
      BY  HARNOOR
    </text>
  </g>
</svg>
